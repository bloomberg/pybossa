Create task with json data payload
---
tags:
  - name: task
parameters:
  - name: task
    required: true
    description: the task to create
    in: body
    schema:
      type: object
      required:
        - project_id
        - info
      properties:
        project_id:
          type: integer
        info:
          type: object
          additionalProperties:
            type: string
        user_pref:
          type: object
          additionalProperties:
            type: string
        fav_user_ids:
          type: array
          items:
            type: integer
        n_answers:
          type: integer
        gold_answers:
          type: object
          additionalProperties:
            type: string
        worker_filter:
          type: object
          additionalProperties:
            type: string
        worker_pref:
          type: object
          additionalProperties:
            type: string
        priority_0:
          type: number
          description: priority value between 0.0 and 1.0
        calibration:
          type: integer
          description: set to 1 for calibration/gold tasks
        expiration:
          type: string
          description: expiration datetime
    examples:
      application/json:
        project_id: 1185
        info:
          col_1: "traditional chinese task"
        user_pref:
          languages:
            - "traditional chinese"
responses:
  200:
    description: created task info
    schema:
      $ref: '#/definitions/Task'
  400:
    description: Bad request - Missing or invalid fields
  401:
    description: Unauthorized - User is not logged in
  403:
    description: Forbidden - User does not have permission
