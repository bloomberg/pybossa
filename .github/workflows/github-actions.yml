name: Bloomberg Pybossa

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    services:
      postgres:
        image: postgres:13.6
        env:
          POSTGRES_PASSWORD: postgres
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432
    steps:
      - name: Checkout repository and submodules recursively
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Pre installation
        env:
          REDIS_VERSION: 7.0.15
        run: |
          wget https://download.redis.io/releases/redis-$REDIS_VERSION.tar.gz
          tar -xzf redis-$REDIS_VERSION.tar.gz
          cd redis-$REDIS_VERSION && make BUILD_TLS=yes install && cd ..
          sudo apt-get update -y
          sudo apt-get install -y libxml2-dev libxmlsec1-dev libsasl2-dev libldap2-dev libssl-dev libkrb5-dev libpq-dev postgresql-client
          redis-server --version
          cd pybossa && ln -s themes/default/translations && cd ..
          cp settings_test.py.tmpl pybossa/settings_test.py

      - name: Generate Redis TLS certificates
        run: |
          mkdir -p /tmp/redis-certs
          openssl genrsa -out /tmp/redis-certs/ca.key 4096
          openssl req -new -x509 -days 1 -key /tmp/redis-certs/ca.key \
            -out /tmp/redis-certs/ca.crt \
            -subj "/CN=Redis-Test-CA"
          openssl genrsa -out /tmp/redis-certs/redis.key 2048
          openssl req -new -key /tmp/redis-certs/redis.key \
            -out /tmp/redis-certs/redis.csr \
            -subj "/CN=localhost"
          openssl x509 -req -days 1 \
            -in /tmp/redis-certs/redis.csr \
            -CA /tmp/redis-certs/ca.crt \
            -CAkey /tmp/redis-certs/ca.key \
            -CAcreateserial \
            -out /tmp/redis-certs/redis.crt

      - name: Start Redis with TLS
        run: |
          redis-server \
            --tls-port 6380 --port 0 \
            --tls-cert-file /tmp/redis-certs/redis.crt \
            --tls-key-file /tmp/redis-certs/redis.key \
            --tls-ca-cert-file /tmp/redis-certs/ca.crt \
            --tls-auth-clients no \
            --daemonize yes
          redis-server contrib/redis/sentinel-tls.conf --sentinel

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
          python -m pip install otpauth

      - name: Testing Redis
        run: |
          redis-cli --tls --cacert /tmp/redis-certs/ca.crt -p 6380 ping
          redis-cli --tls --cacert /tmp/redis-certs/ca.crt -p 6380 set foo 1
          redis-cli --tls --cacert /tmp/redis-certs/ca.crt -p 6380 get foo

      - name: Setting up PostgreSQL DB
        run: |
          psql -U postgres -h localhost -c "create user rtester with createdb login password 'rtester'"
          psql -U postgres -h localhost -c "create database pybossa_test owner rtester encoding 'UTF-8' lc_collate 'en_US.UTF-8' lc_ctype 'en_US.UTF-8' template template0;"
          alembic -c alembictest.ini stamp head
          alembic -c alembictest.ini upgrade head
        env:
          PGPASSWORD: postgres

      - name: Run unit test
        run: |
          echo "::remove-matcher owner=python::"
          ./run_tests

      - name: Run code coverage
        run: |
          python -m pip install coveralls
          coveralls --service=github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
