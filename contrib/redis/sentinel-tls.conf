# Sentinel configuration with TLS enabled (used in CI)
daemonize yes

# Disable plain-text port; expose TLS only
port 0
tls-port 26379

# TLS certificates shared with the Redis server
tls-cert-file /tmp/redis-certs/redis.crt
tls-key-file /tmp/redis-certs/redis.key
tls-ca-cert-file /tmp/redis-certs/ca.crt
tls-auth-clients no
tls-replication yes

# Monitor the Redis master on its TLS port.
# Quorum is 1 because CI runs a single sentinel instance.
sentinel monitor mymaster 127.0.0.1 6380 1

sentinel down-after-milliseconds mymaster 5000
sentinel parallel-syncs mymaster 1
sentinel failover-timeout mymaster 10000
